<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tulpar Kilit — Profil</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <div class="card">
      <h2>👤 Profil Ayarları</h2>
      <form id="profileForm">
        <input type="email" id="email" placeholder="E-posta" disabled>
        <input type="tel" id="phone" placeholder="Telefon" required>

        <label style="font-size:.85em;color:var(--gray);margin-bottom:-8px">İl</label>
        <input type="text" id="il" disabled>

        <label style="font-size:.85em;color:var(--gray);margin-bottom:-8px">İlçe</label>
        <input type="text" id="ilce" disabled>

        <label style="font-size:.85em;color:var(--gray);margin-bottom:-8px">Kurum</label>
        <input type="text" id="institution" disabled>

        <button type="submit" class="btn btn-primary btn-full">Güncelle</button>
      </form>
      <div id="message"></div>
    </div>
  </main>

  <script src="layout.js"></script>
  <script>
    const API_URL = `https://${location.hostname}`;
    const token = sessionStorage.getItem('token');
    if (!token) location.href = 'login.html';

    fetch(`${API_URL}/profile`, { headers: { Authorization: `Bearer ${token}` } })
      .then(r => r.json())
      .then(u => {
        document.getElementById('email').value = u.email || '';
        document.getElementById('phone').value = u.phone || '';
        document.getElementById('il').value = u.ilAdi || '';
        document.getElementById('ilce').value = u.ilceAdi || '';
        document.getElementById('institution').value = u.institutionName || '';
      });

    document.getElementById('profileForm').addEventListener('submit', async e => {
      e.preventDefault();
      const msg = document.getElementById('message');
      try {
        const res = await fetch(`${API_URL}/profile`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body: JSON.stringify({
            phone: document.getElementById('phone').value
          })
        });
        msg.innerHTML = res.ok
          ? '<div class="msg msg-success">Profil güncellendi</div>'
          : '<div class="msg msg-error">Güncelleme başarısız</div>';
      } catch {
        msg.innerHTML = '<div class="msg msg-error">Bağlantı hatası</div>';
      }
    });
  </script>
</body>
</html>
