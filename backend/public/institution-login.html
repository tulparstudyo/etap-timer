<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tulpar Kilit — Kurum Girişi</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <div class="card">
      <h2>Kurum Girişi</h2>
      <form id="instLoginForm">
        <input type="text" id="institutionCode" placeholder="Kurum Kodu" required>
        <input type="password" id="password" placeholder="Şifre" required>
        <button type="submit" class="btn btn-primary btn-full">Giriş Yap</button>
      </form>
      <div class="divider">veya</div>
      <p style="text-align:center;color:var(--gray);font-size:.9em">
        Kullanıcı girişi için <a href="login.html">buraya tıklayın</a>
      </p>
      <div id="message"></div>
    </div>
  </main>

  <script src="layout.js"></script>
  <script>
    const API_URL = `https://${location.hostname}`;

    document.getElementById('instLoginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const msg = document.getElementById('message');
      try {
        const res = await fetch(`${API_URL}/institution/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            institutionCode: document.getElementById('institutionCode').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (res.ok) {
          sessionStorage.setItem('instToken', data.token);
          sessionStorage.setItem('institution', JSON.stringify(data.institution));
          location.href = 'institution-panel.html';
        } else {
          msg.innerHTML = `<div class="msg msg-error">${data.error}</div>`;
        }
      } catch {
        msg.innerHTML = '<div class="msg msg-error">Bağlantı hatası</div>';
      }
    });
  </script>
</body>
</html>
