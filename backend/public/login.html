<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tulpar Kilit — Giriş</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <div class="card">
      <h2>Giriş Yap</h2>
      <form id="loginForm">
        <input type="tel" id="phone" placeholder="Telefon" required>
        <input type="password" id="password" placeholder="Şifre" required>
        <button type="submit" class="btn btn-primary btn-full">Giriş Yap</button>
      </form>
      <div class="divider">veya</div>
      <p style="text-align:center;color:var(--gray);font-size:.9em">
        Hesabınız yok mu? <a href="register.html">Kayıt Ol</a>
      </p>
      <p style="text-align:center;font-size:.9em;margin-top:8px">
        <a href="forgot-password.html">Şifremi Unuttum</a>
      </p>
      <div id="message"></div>
    </div>
  </main>

  <script src="layout.js"></script>
  <script>
    const API_URL = `https://${location.hostname}`;

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const msg = document.getElementById('message');
      try {
        const res = await fetch(`${API_URL}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            phone: document.getElementById('phone').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (res.ok) {
          sessionStorage.setItem('token', data.token);
          sessionStorage.setItem('user', JSON.stringify(data.user));
          location.href = 'index.html';
        } else {
          msg.innerHTML = `<div class="msg msg-error">${data.error}</div>`;
        }
      } catch {
        msg.innerHTML = '<div class="msg msg-error">Bağlantı hatası</div>';
      }
    });
  </script>
</body>
</html>
