<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tulpar Kilit — Şifremi Unuttum</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <div class="card">
      <h2>Şifremi Unuttum</h2>
      <p style="text-align:center;color:var(--gray);font-size:.9em;margin-bottom:16px">
        Telefon numaranızı girin, yeni şifreniz oluşturulacak.
      </p>
      <form id="forgotForm">
        <input type="tel" id="phone" placeholder="Telefon" required>
        <button type="submit" class="btn btn-primary btn-full">Şifre Sıfırla</button>
      </form>
      <div class="divider">veya</div>
      <p style="text-align:center;color:var(--gray);font-size:.9em">
        <a href="login.html">Giriş Yap</a>
      </p>
      <div id="message"></div>
    </div>
  </main>

  <script src="layout.js"></script>
  <script>
    const API_URL = `https://${location.hostname}`;

    document.getElementById('forgotForm').addEventListener('submit', async e => {
      e.preventDefault();
      const msg = document.getElementById('message');
      const btn = e.target.querySelector('button');
      btn.disabled = true;
      btn.textContent = 'Gönderiliyor...';
      try {
        const res = await fetch(`${API_URL}/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone: document.getElementById('phone').value })
        });
        const data = await res.json();
        if (res.ok) {
          msg.innerHTML = `<div class="msg msg-success">Yeni şifreniz: <strong>${data.newPassword}</strong><br>Bu şifreyi not alın ve <a href="login.html">giriş yapın</a>.</div>`;
          document.getElementById('forgotForm').reset();
        } else {
          msg.innerHTML = `<div class="msg msg-error">${data.error}</div>`;
        }
      } catch {
        msg.innerHTML = '<div class="msg msg-error">Bağlantı hatası</div>';
      }
      btn.disabled = false;
      btn.textContent = 'Şifre Sıfırla';
    });
  </script>
</body>
</html>
