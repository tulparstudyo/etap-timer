<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tulpar Kilit</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <div class="card card-wide">
      <div class="hero">
        <h2>🔒 Tulpar Kilit Sistemi</h2>
        <p>Pardus Linux için QR kod tabanlı ekran kilidi. Masaüstünüzü kilitleyin, telefonunuzdan QR taratarak açın.</p>
      </div>
      <div id="guestMenu" class="action-row" style="display:none">
        <div>
          <a href="login.html" class="btn btn-secondary">Giriş Yap</a>
          <a href="register.html" class="btn btn-primary">Kayıt Ol</a>
        </div>
        <p style="text-align:center;width:100%;margin-top:8px">
          <a href="institution-login.html" style="color:var(--gray);font-size:.85em;opacity:.7">🏫 Kurum Girişi</a>
        </p>
      </div>
      <div id="userMenu" style="display:none">
        <p id="greeting" style="text-align:center;color:var(--gray);margin-bottom:16px"></p>
        <div class="action-row">
          <a href="unlock.html" class="btn btn-primary">🔓 Kilit Aç</a>
          <a href="lock.html" class="btn btn-secondary">🔑 Kod Üret</a>
          <a href="profile.html" class="btn btn-outline">👤 Profil</a>
        </div>
      </div>


    </div>
  </main>

  <script src="layout.js"></script>
  <script>
    const token = sessionStorage.getItem('token');
    const user  = JSON.parse(sessionStorage.getItem('user') || '{}');
    if (token && user.name) {
      document.getElementById('userMenu').style.display = 'block';
      document.getElementById('greeting').textContent = `Hoş geldiniz, ${user.name}`;
    } else {
      document.getElementById('guestMenu').style.display = 'flex';
    }
  </script>
</body>
</html>
