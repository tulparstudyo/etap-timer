<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tulpar Kilit — Kilit Aç</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <div class="card card-wide">
      <h2>🔓 QR ile Kilit Aç</h2>
      <p style="text-align:center;color:var(--gray);margin-bottom:4px">
        Masaüstündeki QR kodu kameraya gösterin
      </p>
      <p style="text-align:center;color:var(--gray);font-size:.82em;margin-bottom:16px">
        ⚠️ İlk kullanımda tarayıcı kamera izni isteyecek — "İzin Ver" seçin
      </p>

      <video id="video" autoplay playsinline></video>
      <canvas id="canvas"></canvas>
      <div id="message"></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script src="layout.js"></script>
  <script>
    const API_URL = `https://${location.hostname}`;
    const token = sessionStorage.getItem('token');
    if (!token) location.href = 'login.html';

    const video   = document.getElementById('video');
    const canvas  = document.getElementById('canvas');
    const ctx     = canvas.getContext('2d');
    const msgDiv  = document.getElementById('message');

    async function startCamera() {
      try {
        msgDiv.innerHTML = '<div class="msg msg-info">Kamera izni isteniyor...</div>';
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = stream;
        video.play();
        msgDiv.innerHTML = '<div class="msg msg-info">QR kodu kameraya gösterin</div>';
        requestAnimationFrame(scanQR);
      } catch (err) {
        if (err.name === 'NotAllowedError') {
          msgDiv.innerHTML = `
            <div class="msg msg-error">❌ Kamera erişimi reddedildi</div>
            <p style="color:var(--gray);font-size:.85em;margin-top:8px">
              Tarayıcı adres çubuğundaki kilit/kamera ikonuna tıklayarak izin verin.
            </p>
            <button onclick="location.reload()" class="btn btn-outline" style="margin-top:12px">Tekrar Dene</button>`;
        } else if (err.name === 'NotFoundError') {
          msgDiv.innerHTML = '<div class="msg msg-error">❌ Kamera bulunamadı</div>';
        } else {
          msgDiv.innerHTML = `<div class="msg msg-error">❌ Kamera hatası: ${err.message}</div>`;
        }
      }
    }

    startCamera();

    function scanQR() {
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const code = jsQR(ctx.getImageData(0, 0, canvas.width, canvas.height).data, canvas.width, canvas.height);
        if (code) { handleQRCode(code.data); return; }
      }
      requestAnimationFrame(scanQR);
    }

    async function handleQRCode(qrData) {
      try {
        const { sessionId } = JSON.parse(qrData);
        const res = await fetch(`${API_URL}/unlock`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body: JSON.stringify({ sessionId })
        });
        const data = await res.json();
        if (res.ok && data.unlocked) {
          msgDiv.innerHTML = '<div class="msg msg-success">✓ Kilit açıldı!</div>';
          video.srcObject?.getTracks().forEach(t => t.stop());
          setTimeout(() => location.href = 'index.html', 2000);
        } else {
          msgDiv.innerHTML = `<div class="msg msg-error">✗ ${data.error || 'Kilit açılamadı'}</div>`;
          setTimeout(() => { msgDiv.innerHTML = ''; requestAnimationFrame(scanQR); }, 2000);
        }
      } catch {
        msgDiv.innerHTML = '<div class="msg msg-error">✗ Geçersiz QR kod</div>';
        setTimeout(() => { msgDiv.innerHTML = ''; requestAnimationFrame(scanQR); }, 2000);
      }
    }
  </script>
</body>
</html>
